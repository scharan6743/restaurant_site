<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart - Silari Restaurant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Your Cart</h1>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('menu') }}">Menu</a>
      <a href="{{ url_for('cart_page') }}">Cart</a>
    </nav>
  </header>

  <section class="cart">
    {% if cart %}
      <ul>
        {% for item in cart %}
          <li>{{ item.name }} - ₹{{ item.price }}</li>
        {% endfor %}
      </ul>
      <p><strong>Total: ₹{{ total }}</strong></p>
      <p>This is a demo cart. In a real app, you would add payment and order details.</p>
    {% else %}
      <p>Your cart is empty.</p>
    {% endif %}
  </section>
</body>
</html>
